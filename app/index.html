<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Solo play Mage Knight board game - First Reconnaissance scenario" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png" />
    <title>Mage Knight</title>
    <script>
      if ('serviceWorker' in navigator) {
        // Auto-reload once when a new service worker takes control, so a fresh
        // deploy is shown immediately instead of being masked by an old cached
        // bundle. (Guarded against reload loops.)
        let __mkRefreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (__mkRefreshing) return;
          __mkRefreshing = true;
          window.location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Poll for updates so long-lived tabs pick up new deploys
            reg.update().catch(() => {});
          }).catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
